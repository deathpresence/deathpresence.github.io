<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible">
    <title>Регистрация</title>

    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm"
        crossorigin="anonymous">
    <link rel="stylesheet" href="assets/css/style.css"></link>
    <link rel="stylesheet" href="assets/fontawesome/css/fontawesome-all.min.css">
</head>

<body class="body">
    <main>
        <div class="container">
            <div class="row row-xs">
                <div class="col-3"></div>
                <div class="col-lg-6 col-sm-12 signin-wrapper">
                    <div class="card card-signin">
                        <h2 class="navbar-brand">
                            <a href="index.html">AltoBus
                            </a>
                        </h2>
                        <h2 class="signin-title-primary">Начинаем работу!</h2>
                        <h3 class="signin-title-secondary">Зарегистрируйтесь, чтобы начать использовать наш сервис.</h3>
                        <div class="form-group">
                            <input type="text" class="form-control" placeholder="Введите Email">
                        </div>
                        <div class="form-group">
                            <input type="password" class="form-control" placeholder="Введите пароль">
                        </div>
                        <div class="form-group">
                            <div class="btn-group btn-group-toggle " data-toggle="buttons">
                                <label class="btn btn-outline-primary active" id="customer-toggle">
                                    <input type="radio" name="options" autocomplete="off" checked>Я Заказчик
                                </label>
                                <label class="btn btn-outline-primary" id="carrier-toggle">
                                    <input type="radio" name="options" autocomplete="off">Я Перевозчик
                                </label>
                            </div>
                        </div>
                        <div class="form-group" id="customer">
                            <div class="btn-group btn-group-toggle" data-toggle="buttons">
                                <label class="btn btn-outline-primary active">
                                    <input type="radio" name="options" autocomplete="off" checked>Юр. лицо
                                </label>
                                <label class="btn btn-outline-primary">
                                    <input type="radio" name="options" autocomplete="off">ИП
                                </label>
                                <label class="btn btn-outline-primary">
                                    <input type="radio" name="options" autocomplete="off">Физ. лицо
                                </label>
                            </div>
                        </div>
                        <div class="form-group" id="carrier">
                            <div class="btn-group btn-group-toggle" data-toggle="buttons">
                                <label class="btn btn-outline-primary active">
                                    <input type="radio" name="options" autocomplete="off" checked>Юр. лицо
                                </label>
                                <label class="btn btn-outline-primary">
                                    <input type="radio" name="options" autocomplete="off">ИП
                                </label>
                            </div>
                        </div>
                        <button class="btn btn-primary btn-block btn-signin mg-t-50">Регистрация</button>
                        <p class="mg-b-0">Уже есть аккаунт?
                            <a href="page-signup.html">Войдите</a>
                        </p>
                    </div>
                </div>
                <div class="col-3"></div>
            </div>
        </div>
    </main>
    <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js" integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN"
        crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.12.9/umd/popper.min.js" integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q"
        crossorigin="anonymous"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js" integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl"
        crossorigin="anonymous"></script>
    <script>
        $(document).ready(function () {
            $("#carrier").hide();
            $("#customer-toggle").click(function () {
                $("#carrier").hide();
                $("#customer").show();
            });
            $("#carrier-toggle").click(function () {
                $("#carrier").show();
                $("#customer").hide();
            });
        });
    </script>
</body>

</html>
